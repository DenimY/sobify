<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font-family: -apple-system, sans-serif; background: #f9fafb; }

    .header {
      background: #1a56db;
      color: white;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
    }
    .header span { font-weight: 400; font-size: 12px; opacity: .8; display: block; margin-top: 2px; }

    .section { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
    .section-title { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      transition: opacity .15s;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-coupang { background: #fee500; color: #1a1a1a; }
    .btn-naver   { background: #03c75a; color: white; }
    .btn-all     { background: #1a56db; color: white; }

    .btn .icon { font-size: 16px; }
    .btn .label { flex: 1; text-align: left; }
    .btn .status { font-size: 11px; opacity: .7; }

    .log {
      padding: 10px 16px;
      max-height: 140px;
      overflow-y: auto;
      background: #111827;
    }
    .log-line {
      font-size: 11px;
      font-family: monospace;
      line-height: 1.6;
      color: #9ca3af;
    }
    .log-line.ok   { color: #34d399; }
    .log-line.err  { color: #f87171; }
    .log-line.info { color: #60a5fa; }

    .server-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #374151;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
    .dot.on  { background: #10b981; }
    .dot.off { background: #ef4444; }
    input[type=number] {
      width: 64px; border: 1px solid #d1d5db; border-radius: 4px;
      padding: 3px 6px; font-size: 12px; margin-left: auto;
    }
    .config-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: #374151; margin-top: 8px;
    }
    .config-row label { color: #6b7280; }
  </style>
</head>
<body>
  <div class="header">
    💰 Sobify
    <span>쿠팡 · 네이버페이 동기화</span>
  </div>

  <div class="section">
    <div class="server-row">
      <div class="dot" id="serverDot"></div>
      <span id="serverLabel">서버 확인 중...</span>
      <input type="number" id="portInput" value="8765" min="1000" max="65535" title="sobify 포트">
    </div>
    <div class="config-row">
      <label>최대 수집 페이지</label>
      <input type="number" id="maxPagesInput" value="10" min="1" max="100" title="페이지 최대 수집 수">
    </div>
  </div>

  <div class="section">
    <div class="section-title">동기화</div>
    <button class="btn btn-all" id="btnAll">
      <span class="icon">🔄</span>
      <span class="label">전체 동기화</span>
      <span class="status" id="statusAll"></span>
    </button>
    <button class="btn btn-coupang" id="btnCoupang">
      <span class="icon">🛒</span>
      <span class="label">쿠팡만</span>
      <span class="status" id="statusCoupang"></span>
    </button>
    <button class="btn btn-naver" id="btnNaver">
      <span class="icon">🟢</span>
      <span class="label">네이버페이만</span>
      <span class="status" id="statusNaver"></span>
    </button>
  </div>

  <div class="log" id="log">
    <div class="log-line info">준비됨. 동기화 버튼을 누르세요.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
