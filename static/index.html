<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobify</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #5c6bc0;
    --income: #26a69a;
    --expense: #ef5350;
    --bg: #f0f2f8;
    --card: #fff;
    --border: #e4e7f0;
    --muted: #7c8db0;
    --radius: 14px;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: #2d3561; font-size: 14px; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w); background: #fff; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
  }
  .sidebar-logo {
    padding: 22px 20px 18px; font-size: 17px; font-weight: 700; color: var(--primary);
    border-bottom: 1px solid var(--border); letter-spacing: -0.3px;
  }
  .sidebar-logo span { font-size: 11px; font-weight: 400; color: var(--muted); display: block; margin-top: 2px; }
  .nav-list { list-style: none; padding: 10px 0; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; cursor: pointer; border-radius: 0; transition: all .15s; color: #555; font-size: 14px; }
  .nav-item:hover { background: #f0f2f8; color: var(--primary); }
  .nav-item.active { background: #eef0fb; color: var(--primary); font-weight: 600; border-right: 3px solid var(--primary); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px; }
  #health-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #ccc; margin-right: 5px; }
  #health-dot.ok { background: #26a69a; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 17px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  #page-content { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* Cards */
  .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px 22px; }
  .card-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-size: 22px; font-weight: 700; }
  .card-value.income { color: var(--income); }
  .card-value.expense { color: var(--expense); }
  .card-value.savings { color: var(--primary); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Chart grids */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .charts-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px 22px; }
  .chart-card.full { grid-column: span 2; }
  .chart-title { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 14px; }
  .chart-wrap { position: relative; }

  /* Filters */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .filter-bar select, .filter-bar input[type=text] {
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px;
    background: #fff; color: #333; outline: none; height: 36px;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); }
  .btn { border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; height: 36px; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  .btn-danger { background: #fff; color: var(--expense); border: 1px solid var(--expense); }
  .btn-sm { padding: 4px 10px; font-size: 12px; height: 28px; border-radius: 6px; }
  .toggle-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; cursor: pointer; height: 36px; }
  .toggle-label input { accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer; }

  /* Table */
  .table-wrap { overflow-x: auto; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8f9fd; font-size: 12px; color: var(--muted); font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--primary); }
  td { padding: 9px 14px; border-bottom: 1px solid #f3f4f8; font-size: 13px; vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbff; }
  .amount-inc { color: var(--income); font-weight: 600; }
  .amount-exp { color: var(--expense); font-weight: 600; }
  .corrected-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #ff9800; margin-right: 5px; vertical-align: middle; }
  .cat-badge { display: inline-block; background: #eef0fb; color: var(--primary); border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
  .cat-badge-edit { transition: background .15s; }
  td:has(.cat-badge-edit):hover .cat-badge-edit { background: #dde0f5; }
  .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 16px; }
  .page-btn { border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; background: #fff; font-size: 13px; }
  .page-btn:hover, .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .page-info { font-size: 13px; color: var(--muted); }

  /* Upload */
  .drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 50px 30px;
    text-align: center; cursor: pointer; transition: all .2s; color: var(--muted);
    background: var(--card);
  }
  .drop-zone.drag-over { border-color: var(--primary); background: #eef0fb; color: var(--primary); }
  .drop-zone-icon { font-size: 40px; margin-bottom: 10px; }
  .drop-zone-text { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
  .drop-zone-sub { font-size: 12px; }
  .file-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .file-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .file-item.active-file { border-color: var(--primary); background: #f7f8fe; }
  .file-icon { font-size: 22px; }
  .file-info { flex: 1; }
  .file-name { font-weight: 600; font-size: 14px; }
  .file-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-badge { display: inline-block; background: var(--primary); color: #fff; border-radius: 4px; padding: 1px 7px; font-size: 10px; margin-left: 6px; vertical-align: middle; }

  /* AI chat */
  .chat-container { display: flex; flex-direction: column; height: calc(100vh - 160px); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; display: flex; flex-direction: column; gap: 12px; }
  .chat-bubble { max-width: 72%; padding: 11px 15px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; }
  .chat-bubble.user { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-bubble.ai { background: #f0f2f8; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .chat-input-row { display: flex; gap: 8px; background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 12px; }
  .chat-input-row input[type=text] { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 13px; outline: none; }
  .chat-input-row input[type=text]:focus { border-color: var(--primary); }
  .image-upload-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; }
  .image-upload-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .img-drop { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; color: var(--muted); font-size: 13px; }
  .img-drop:hover { border-color: var(--primary); color: var(--primary); }

  /* Rules */
  .rules-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; margin-bottom: 20px; }
  .rules-form h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select { border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px; background: #fff; height: 36px; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }

  /* Merchant bar */
  .merch-bar-wrap { width: 100px; }
  .merch-bar { height: 8px; border-radius: 4px; background: var(--primary); opacity: .7; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: var(--radius); padding: 28px 28px 22px; min-width: 360px; max-width: 460px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .modal .form-group { margin-bottom: 14px; }
  .modal .form-group label { font-size: 13px; margin-bottom: 5px; }
  .modal .form-group select { width: 100%; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  /* Category icon picker */
  .cat-picker-row td { padding: 0 !important; background: #f8f9fd; border-bottom: 2px solid var(--primary) !important; }
  .cat-picker-wrap { padding: 14px 18px 10px; }
  .cat-picker-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-icon-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    width: 72px; padding: 8px 4px; border-radius: 10px; border: 2px solid transparent;
    cursor: pointer; background: #fff; transition: all .12s; font-size: 11px;
    color: #555; font-weight: 500;
  }
  .cat-icon-btn:hover { border-color: var(--primary); background: #eef0fb; color: var(--primary); }
  .cat-icon-btn.selected { border-color: var(--primary); background: #eef0fb; color: var(--primary); }
  .cat-icon-btn .ci { font-size: 22px; line-height: 1; }
  .cat-picker-close { float: right; cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .cat-picker-close:hover { background: #eee; }

  /* Toast */
  #toast-container { position: fixed; top: 20px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: #333; color: #fff; border-radius: 10px; padding: 12px 18px; font-size: 13px; min-width: 200px; box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideIn .25s ease; display: flex; align-items: center; gap: 8px; }
  .toast.success { background: #26a69a; }
  .toast.error { background: #ef5350; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

  /* Section header */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h2 { font-size: 16px; font-weight: 700; }

  /* Period selector in topbar */
  #period-select { border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 13px; background: #fff; outline: none; cursor: pointer; }
  #period-select:focus { border-color: var(--primary); }

  /* Source filter buttons (dashboard topbar & transactions inline) */
  .source-filter-btns { display: flex; gap: 4px; }
  .type-toggle-btn {
    padding: 4px 10px; font-size: 12px; border: 1px solid var(--border);
    border-radius: 5px; background: var(--card); color: var(--muted);
    cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .type-toggle-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .type-toggle-btn[data-type="income"].active { background: var(--income); border-color: var(--income); }
  .type-toggle-btn[data-type="취소"].active { background: var(--muted); border-color: var(--muted); }
  .source-filter-btns .sf-btn {
    border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px;
    font-size: 12px; font-weight: 500; cursor: pointer; background: #fff;
    color: var(--muted); transition: all .15s; display: flex; align-items: center; gap: 5px;
  }
  .source-filter-btns .sf-btn:hover { border-color: var(--primary); color: var(--primary); }
  .source-filter-btns .sf-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .source-filter-btns .sf-btn.banksalad.active { background: #5c6bc0; border-color: #5c6bc0; color: #fff; }
  .source-filter-btns .sf-btn.coupang.active { background: #ff9800; border-color: #ff9800; color: #fff; }
  .source-filter-btns .sf-btn.naverpay.active { background: #03c75a; border-color: #03c75a; color: #fff; }
  .sf-logo { width: 16px; height: 16px; border-radius: 3px; display: inline-block; flex-shrink: 0; }

  /* Transactions summary bar */
  .tx-summary-bar {
    display: flex; gap: 20px; align-items: center;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 20px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .tx-summary-item { display: flex; flex-direction: column; gap: 2px; }
  .tx-summary-label { font-size: 11px; color: var(--muted); }
  .tx-summary-value { font-size: 15px; font-weight: 700; }

  /* Suggest btn */
  #suggest-btn { display: flex; align-items: center; gap: 6px; }

  .empty-state { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  .loading { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

  .subcat-text { color: var(--muted); font-size: 12px; }
  .subcat-btn {
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
    background: var(--card); font-size: 13px; cursor: pointer; color: var(--text);
    transition: all .15s;
  }
  .subcat-btn:hover { border-color: var(--primary); color: var(--primary); background: #eef0fb; }
  .subcat-btn.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
</style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-logo">
    💰 가계부
    <span>Household Budget Dashboard</span>
  </div>
  <ul class="nav-list">
    <li class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> 대시보드</li>
    <li class="nav-item" data-page="transactions"><span class="nav-icon">📋</span> 거래내역</li>
    <li class="nav-item" data-page="merchants"><span class="nav-icon">🏪</span> 사용처분석</li>
    <li class="nav-item" data-page="upload"><span class="nav-icon">📂</span> 파일업로드</li>
    <li class="nav-item" data-page="ai"><span class="nav-icon">🤖</span> AI분석</li>
    <li class="nav-item" data-page="rules"><span class="nav-icon">🔖</span> 카테고리규칙</li>
  </ul>
  <div class="sidebar-footer">
    <span id="health-dot"></span><span id="health-text">연결 확인 중...</span>
  </div>
</nav>

<!-- Main -->
<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">대시보드</div>
    <div class="topbar-right">
      <div class="source-filter-btns" id="source-filter-btns" style="display:none">
        <button class="sf-btn active" data-source="">전체</button>
        <button class="sf-btn banksalad" data-source="banksalad"><img class="sf-logo" src="https://www.google.com/s2/favicons?domain=banksalad.com&sz=32" onerror="this.style.display='none'"> 뱅크샐러드</button>
        <button class="sf-btn coupang" data-source="coupang"><img class="sf-logo" src="https://www.google.com/s2/favicons?domain=coupang.com&sz=32" onerror="this.style.display='none'"> 쿠팡</button>
        <button class="sf-btn naverpay" data-source="naverpay"><svg class="sf-logo" viewBox="0 0 36 36"><rect width="36" height="36" rx="8" fill="#03c75a"/><text x="18" y="27" text-anchor="middle" font-size="22" fill="white" font-family="sans-serif" font-weight="bold">N</text></svg> 네이버페이</button>
      </div>
      <select id="period-select" title="기간 선택"></select>
      <span id="active-file-label" style="font-size:12px;color:var(--muted);"></span>
    </div>
  </div>
  <div id="page-content"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Category edit modal -->
<div id="match-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeMatchModal()">
  <div class="modal" style="max-width:560px;width:95%">
    <h3>매칭 후보 찾기</h3>
    <p id="match-modal-desc" style="font-size:13px;color:var(--muted);margin:0 0 12px"></p>
    <div id="match-candidates-list"></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn btn-outline" onclick="closeMatchModal()">닫기</button>
    </div>
  </div>
</div>

<div id="cat-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3>카테고리 수정</h3>
    <input type="hidden" id="modal-tx-id">
    <div class="form-group">
      <label>카테고리</label>
      <select id="modal-cat"></select>
    </div>
    <div class="form-group">
      <label>서브카테고리</label>
      <select id="modal-subcat"></select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeCatModal()">취소</button>
      <button class="btn btn-primary" onclick="saveCatModal()">저장</button>
    </div>
  </div>
</div>

<script>
// ─── Constants & State ────────────────────────────────────────────────────────
const startDay = 9;
let currentPage = 'dashboard';
let activeFileId = null;
let periodMap = {};     // "2026-04" -> {label, from, to}
let periodKeys = [];    // sorted desc
let categories = [];
let subcatMap = {};
let sessionId = 'sess_' + Math.random().toString(36).slice(2);

// Transaction filter state
let txFilter = {
  month: '',
  type: ['income','expense'],  // 기본: 수입+지출 (취소 제외)
  cat: '',
  search: '',
  method_search: '',
  source: '',
  amount_sign: '',   // 전체 표시 (뱅크샐러드 음수 지출 포함)
  exclude_transfer: true,  // 이체 기본 제외
  offset: 0,
  limit: 100,
  sort: 'date',
  sortDir: -1
};

const SOURCE_LABELS = { banksalad: '뱅크샐러드', coupang: '쿠팡', naverpay: '네이버페이' };
function sourceLabel(s) { return SOURCE_LABELS[s] || s || '기타'; }
let txTotal = 0;
let dashboardSource = '';

// ─── Period helpers ───────────────────────────────────────────────────────────
function buildPeriodMap() {
  const map = {};
  const now = new Date();
  // Generate last 24 months of periods
  for (let i = 0; i < 24; i++) {
    let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const key = `${y}-${String(m).padStart(2,'0')}`;
    const fromDate = `${y}-${String(m).padStart(2,'0')}-${String(startDay).padStart(2,'0')}`;
    let toY = y, toM = m + 1;
    if (toM > 12) { toM = 1; toY++; }
    const toPrevDay = startDay - 1;
    const toDate = `${toY}-${String(toM).padStart(2,'0')}-${String(toPrevDay).padStart(2,'0')}`;
    const label = `${y}년 ${m}월 (${m}.${startDay}~${toM}.${toPrevDay})`;
    map[key] = { label, from: fromDate, to: toDate };
  }
  return map;
}

function getCurrentPeriodKey() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  // If before startDay, we're still in previous month's period
  if (d < startDay) {
    let pm = m - 1, py = y;
    if (pm < 1) { pm = 12; py--; }
    return `${py}-${String(pm).padStart(2,'0')}`;
  } else {
    return `${y}-${String(m).padStart(2,'0')}`;
  }
}

function buildPeriodSelector() {
  periodMap = buildPeriodMap();
  periodKeys = Object.keys(periodMap).sort().reverse();
  const sel = document.getElementById('period-select');
  sel.innerHTML = '<option value="">전체 기간</option>';
  periodKeys.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = periodMap[k].label;
    sel.appendChild(opt);
  });
  // Default: previous period
  const cur = getCurrentPeriodKey();
  const curIdx = periodKeys.indexOf(cur);
  const defKey = periodKeys[curIdx + 1] || periodKeys[0] || '';
  sel.value = defKey;
  txFilter.month = defKey;
}

// ─── API helpers ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    if (opts.json !== undefined) {
      opts = { ...opts, headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }, body: JSON.stringify(opts.json) };
      delete opts.json;
    }
    const res = await fetch(path, opts);
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || res.statusText);
    }
    if (res.status === 204) return null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) return res.json();
    return res.text();
  } catch (e) {
    throw e;
  }
}

function periodParams(monthKey) {
  if (!monthKey || !periodMap[monthKey]) return {};
  return { date_from: periodMap[monthKey].from, date_to: periodMap[monthKey].to };
}

  t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ─── Format helpers ───────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null) return '-';
  return Number(n).toLocaleString('ko-KR') + '원';
}
function fmtNum(n) {
  return Number(n).toLocaleString('ko-KR');
}
function fmtDate(s, t) {
  if (!s) return '';
  const date = s.slice(0, 10);
  const time = (t && t !== '00:00' && t !== '00:00:00') ? `<br><span style="font-size:11px;color:var(--muted)">${t.slice(0,5)}</span>` : '';
  return date + time;
}

// ─── Navigation ──────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {

});

function navigateTo(page, pushState = true) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navEl) navEl.classList.add('active');
  currentPage = page;
  document.getElementById('page-title').textContent = navEl ? navEl.textContent.trim() : page;
  if (pushState) history.pushState({ page }, '', `#${page}`);
  renderPage(page);
}

window.addEventListener('popstate', e => {
  const page = e.state?.page || 'dashboard';
  navigateTo(page, false);
});

document.getElementById('period-select').addEventListener('change', e => {
  txFilter.month = e.target.value;

  else if (currentPage === 'merchants') loadMerchants();

function renderPage(page) {
  document.getElementById('source-filter-btns').style.display = page === 'dashboard' ? 'flex' : 'none';
  const c = document.getElementById('page-content');

}

  const checked = document.querySelectorAll('#f-type-btns input[type=checkbox]:checked');
  if (!cb.checked && checked.length === 0) { cb.checked = true; return; } // 최소 1개
  txFilter.type = Array.from(document.querySelectorAll('#f-type-btns input[type=checkbox]:checked'))
    .map(el => el.dataset.type);
  txFilter.offset = 0;
  loadTransactions();
}

function applyTxFilter() {
  txFilter.month = document.getElementById('f-month').value;
  // txFilter.type는 toggleTypeFilter에서 직접 관리
  // txFilter.cat는 selectTxCat에서 직접 관리
  txFilter.search = document.getElementById('f-search')?.value || '';
  txFilter.method_search = document.getElementById('f-method-search')?.value || '';
  const transferCb = document.getElementById('f-transfer');
  txFilter.exclude_transfer = !(transferCb && transferCb.checked);
  const weekendCb = document.getElementById('f-weekend');
  if (weekendCb) txFilter.weekend_only = weekendCb.checked;
  const limitSel = document.getElementById('f-limit');
  if (limitSel) txFilter.limit = parseInt(limitSel.value);
  txFilter.offset = 0;
  document.getElementById('period-select').value = txFilter.month;
  loadTransactions();
}

async function redetectCancel() {
  try {
    const r = await api('/api/transactions/redetect-cancel', { method: 'POST' });
    toast(`취소 쌍 ${r.marked}건 감지됨`);

    toast('재감지 실패: ' + e.message, 'error');

}

function resetTxFilter() {
  txFilter = { month: getCurrentPeriodKey(), type: ['income','expense'], cat: '', search: '', method_search: '', source: '', amount_sign: '', exclude_transfer: true, weekend_only: false, offset: 0, limit: 100, sort: 'date', sortDir: -1 };

let selectMode = false;
const selectedIds = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  const btn = document.getElementById('select-mode-btn');
  const bar = document.getElementById('select-action-bar');

function toggleSelectRow(id, cb) {
  if (cb.checked) selectedIds.add(id);
  else selectedIds.delete(id);
  const label = document.getElementById('select-count-label');
  if (label) label.textContent = `${selectedIds.size}건 선택됨`;
}

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.tx-select-cb').forEach(cb => cb.checked = false);
  const label = document.getElementById('select-count-label');

async function markSelectedCancel() {
  if (!selectedIds.size) return alert('선택된 항목이 없습니다.');
  await api('/api/transactions/cancel-pair', { method: 'POST', body: JSON.stringify({ ids: [...selectedIds], cancel: true }) });
  clearSelection();
  loadTransactions();
}

async function markSelectedUncancel() {
  if (!selectedIds.size) return alert('선택된 항목이 없습니다.');
  await api('/api/transactions/cancel-pair', { method: 'POST', body: JSON.stringify({ ids: [...selectedIds], cancel: false }) });
  clearSelection();
  loadTransactions();
}

// 대시보드 차트 클릭 → 모달로 거래 목록 표시
function filterByCategory(cat) {
  // 대시보드 소스 필터가 활성화된 경우 함께 전달
  const src = dashboardSource || '';
  const titleSuffix = src ? ` (${SOURCE_LABELS[src] || src})` : '';
  openDashboardModal({ cat, source: src, title: `카테고리: ${cat}${titleSuffix}` });
}

function filterBySource(source) {
  openDashboardModal({ source, title: `출처: ${SOURCE_LABELS[source] || source}` });
}

let _dashModalCtx = { cat: '', source: '', sort: 'date', dir: -1, txs: [] };

async function openDashboardModal({ cat = '', source = '', title = '' } = {}) {
  _dashModalCtx = { cat, source, sort: 'date', dir: -1, txs: [], title };
  const modal = document.getElementById('dash-modal');
  document.getElementById('dash-modal-title').textContent = title;
  document.getElementById('dash-modal-body').innerHTML = '<div class="loading">불러오는 중...</div>';
  modal.style.display = 'flex';

  const pp = periodParams(txFilter.month);
  const params = new URLSearchParams();
  if (pp.date_from) { params.set('date_from', pp.date_from); params.set('date_to', pp.date_to); }
  if (cat) params.set('cat', cat);
  if (source) params.set('source', source);
  params.set('limit', '500');
  params.set('exclude_transfer', 'true');

  try {
    const data = await api('/api/transactions?' + params.toString());
    _dashModalCtx.txs = data.items || [];
    renderDashModalTable();
  } catch (e) {
    document.getElementById('dash-modal-body').innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
  }
}

function renderDashModalTable() {
  const { txs, sort, dir, cat, source } = _dashModalCtx;
  const body = document.getElementById('dash-modal-body');
  if (!txs.length) { body.innerHTML = '<div class="empty-state">거래 내역이 없습니다.</div>'; return; }

  const sorted = [...txs].sort((a, b) => {
    let av = sort === 'amount' ? Math.abs(a.amount||0) : sort === 'desc' ? (a.desc||'') : a.date;
    let bv = sort === 'amount' ? Math.abs(b.amount||0) : sort === 'desc' ? (b.desc||'') : b.date;
    return av < bv ? -dir : av > bv ? dir : 0;
  });

  const totalExp = txs.filter(t => t.type === '지출').reduce((s, t) => s + Math.abs(t.amount||0), 0);
  const arrow = c => sort === c ? (dir > 0 ? ' ▲' : ' ▼') : '';
  const th = (c, label, align='') => `<th class="sortable" style="cursor:pointer;user-select:none;${align?'text-align:'+align:''}" onclick="sortDashModal('${c}')">${label}${arrow(c)}</th>`;

  body.innerHTML = `
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">${txs.length}건 · 지출 합계 <strong style="color:var(--expense)">${fmt(totalExp)}</strong></div>
    <div class="table-wrap" style="max-height:55vh;overflow-y:auto">
      <table>
        <thead><tr>
          ${th('date','날짜')} ${th('desc','제품명')} <th>카테고리</th> <th>출처</th> ${th('amount','금액','right')} <th></th>
        </tr></thead>
        <tbody>
        ${sorted.map(t => {
          const ci = CAT_ICONS[t.cat];
          const amtColor = t.type === '수입' ? 'var(--income)' : t.type === '취소' ? 'var(--muted)' : 'var(--expense)';
          const catBadge = ci ? `<span class="cat-badge" style="cursor:pointer" onclick="openCatModal(${t.id},'${esc(t.cat||'')}','${esc(t.subcat||'')}')">${ci.icon} ${esc(t.cat)}</span>`
            : `<span class="cat-badge" style="cursor:pointer;color:var(--muted)" onclick="openCatModal(${t.id},'${esc(t.cat||'')}','${esc(t.subcat||'')}')">+ 설정</span>`;
          return `<tr id="dash-tx-row-${t.id}" data-tx-id="${t.id}" data-desc="${esc(t.desc||'')}" data-amount="${Math.abs(t.amount||0)}">
            <td style="white-space:nowrap;color:var(--muted);font-size:12px">${fmtDate(t.date)}</td>
            <td>${esc(t.desc||t.merchant||'')}</td>
            <td>${catBadge}</td>
            <td style="font-size:12px;color:var(--muted)">${SOURCE_LABELS[t.source]||t.source||'-'}</td>
            <td style="text-align:right;color:${amtColor};font-weight:600">${fmt(Math.abs(t.amount||0))}</td>
            <td><button style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:14px" title="삭제" onclick="deleteDashTx(${t.id})">🗑</button></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-outline btn-sm" onclick="goDashToTransactions()">거래내역 페이지로 →</button>
    </div>`;
}

function sortDashModal(col) {
  if (_dashModalCtx.sort === col) _dashModalCtx.dir *= -1;
  else { _dashModalCtx.sort = col; _dashModalCtx.dir = col === 'amount' ? -1 : 1; }
  renderDashModalTable();
}

async function deleteDashTx(txId) {
  if (!confirm('이 거래를 삭제하시겠습니까?')) return;
  try {
    await api(`/api/transactions/${txId}`, { method: 'DELETE' });
    _dashModalCtx.txs = _dashModalCtx.txs.filter(t => t.id !== txId);
    renderDashModalTable();
  } catch (e) { toast('삭제 실패: ' + e.message, 'error'); }
}

function goDashToTransactions() {
  const { cat, source } = _dashModalCtx;
  closeDashModal();
  // 필터 적용 후 거래내역 이동
  txFilter.cat = cat || '';
  txFilter.source = source || '';
  txFilter.offset = 0;
  navigateTo('transactions');
}

function closeDashModal() {
  document.getElementById('dash-modal').style.display = 'none';
}

async function loadTransactions({ keepScroll = false } = {}) {
  const wrap = document.getElementById('tx-table-wrap');
  if (!wrap) return;
  const pageContent = document.getElementById('page-content');
  const savedScroll = keepScroll ? pageContent?.scrollTop : 0;
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  _cancelPartnerLoaded.clear();

  const params = new URLSearchParams();
  // file_id는 의도적으로 보내지 않음: 비워두면 서버가 "활성 뱅크샐러드 파일 + 모든 동기화 출처"를 합쳐서 반환함
  if (txFilter.month && periodMap[txFilter.month]) {
    params.set('date_from', periodMap[txFilter.month].from);
    params.set('date_to', periodMap[txFilter.month].to);
  }
  if (txFilter.type && txFilter.type.length > 0) params.set('tx_type', txFilter.type.join(','));
  if (txFilter.cat) params.set('cat', txFilter.cat);
  if (txFilter.source) params.set('source', txFilter.source);
  if (txFilter.search) params.set('search', txFilter.search);
  if (txFilter.method_search) params.set('method_search', txFilter.method_search);
  if (txFilter.amount_sign) params.set('amount_sign', txFilter.amount_sign);
  params.set('exclude_transfer', txFilter.exclude_transfer ? 'true' : 'false');
  if (txFilter.weekend_only) params.set('weekend_only', 'true');
  if (txFilter.sort) params.set('sort', txFilter.sort);
  params.set('sort_dir', txFilter.sortDir);
  params.set('limit', txFilter.limit);
  params.set('offset', txFilter.offset);

  try {
    const data = await api('/api/transactions?' + params.toString());
    const txs = data.items || [];
    txTotal = data.total || txs.length;
    renderTxSummary(txs, data.total_expense || 0, data.total_income || 0);
    renderTxTable(txs, wrap);
    if (keepScroll && pageContent) requestAnimationFrame(() => { pageContent.scrollTop = savedScroll; });
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
  }
}

function renderTxSummary(txs, totalExpense, totalIncome) {
  const bar = document.getElementById('tx-summary-bar');
  if (!bar) return;
  const expense = totalExpense;
  const income  = totalIncome;
  const count   = txs.length;
  const sourceLabel2 = txFilter.source ? (SOURCE_LABELS[txFilter.source] || txFilter.source) : '전체';
  bar.innerHTML = `
    <div class="tx-summary-bar">
      <div class="tx-summary-item">
        <span class="tx-summary-label">조회 건수</span>
        <span class="tx-summary-value">${fmtNum(txTotal)}건 <span style="font-size:12px;color:var(--muted)">(현재 페이지 ${fmtNum(count)}건)</span></span>
      </div>
      <div style="width:1px;height:32px;background:var(--border)"></div>
      <div class="tx-summary-item">
        <span class="tx-summary-label">지출 합계</span>
        <span class="tx-summary-value amount-exp">${fmt(expense)}</span>
      </div>
      <div class="tx-summary-item">
        <span class="tx-summary-label">수입 합계</span>
        <span class="tx-summary-value amount-inc">${fmt(income)}</span>
      </div>
      <div style="width:1px;height:32px;background:var(--border)"></div>
      <div class="tx-summary-item">
        <span class="tx-summary-label">출처</span>
        <span class="tx-summary-value" style="font-size:13px;font-weight:600;color:var(--primary)">${sourceLabel2}</span>
      </div>
    </div>
  `;
}

      <table>
        <thead>
          <tr>
            ${selectMode ? '<th style="width:32px"></th>' : ''}

            <th>유형</th>
            <th class="sortable" onclick="sortTx('desc')">사용처 ${txFilter.sort==='desc' ? (txFilter.sortDir>0?'▲':'▼') : ''}</th>
            <th>카테고리 <span style="font-weight:400;color:var(--muted);font-size:11px">(클릭하여 변경)</span></th>
            <th>출처</th>
            <th class="sortable" onclick="sortTx('amount')">금액 ${txFilter.sort==='amount' ? (txFilter.sortDir>0?'▲':'▼') : ''}</th>
            <th>결제수단</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="tx-tbody">
        ${txs.map(tx => {
          const ci = CAT_ICONS[tx.cat];
          const catLabel = ci ? `${ci.icon} ${esc(tx.cat)}` : (tx.cat ? esc(tx.cat) : null);
          const isCancelled = tx.type === '취소';
          const rowStyle = isCancelled ? 'opacity:0.45;text-decoration:line-through' : '';
          const isMatchable = tx.source === 'banksalad' && !isCancelled &&
            (/네이버페이|쿠팡|네이버파이낸셜/.test(tx.method||'') || /네이버페이|쿠팡|네이버파이낸셜/.test(tx.desc||''));
          const descTd = isMatchable
            ? `<td style="cursor:pointer;color:var(--primary);text-decoration:underline dotted" onclick="openMatchModal(${tx.id},'${esc(tx.desc||'')}',${tx.amount})" title="클릭하여 동기화 데이터에서 매치">${tx.corrected?'<span class="corrected-dot"></span>':''}${esc(tx.desc||'')} 🔍</td>`
            : isCancelled
            ? `<td style="cursor:pointer;color:var(--muted);text-decoration:underline dotted" onclick="toggleCancelPartner(${tx.id},this)" title="클릭하여 연결된 거래 보기">${tx.corrected?'<span class="corrected-dot"></span>':''}${esc(tx.desc||'')} 🔗</td>`
            : `<td>${tx.corrected?'<span class="corrected-dot"></span>':''}${esc(tx.desc||'')}</td>`;
          const colCount = selectMode ? 9 : 8;
          return `
          <tr data-tx-id="${tx.id}" data-desc="${esc(tx.desc || '')}" data-amount="${Math.abs(tx.amount||0)}" style="${rowStyle}">
            ${selectMode ? `<td><input type="checkbox" class="tx-select-cb" ${selectedIds.has(tx.id)?'checked':''} onchange="toggleSelectRow(${tx.id},this)"></td>` : ''}
            <td>${fmtDate(tx.date, tx.time)}</td>
            <td>${tx.type === '취소' ? '<span style="color:var(--muted)">취소</span>' : tx.type === '수입' ? '<span style="color:var(--income)">수입</span>' : '<span style="color:var(--expense)">지출</span>'}</td>
            ${descTd}
            <td class="cat-cell" onclick="openCatModal('${tx.id}','${esc(tx.cat||'')}','${esc(tx.subcat||'')}')" style="cursor:pointer" title="클릭하여 카테고리 변경">
              ${catLabel
                ? `<span class="cat-badge cat-badge-edit">${catLabel}</span>`
                : `<span class="cat-badge cat-badge-edit" style="background:#fff0f0;color:#aaa;border:1px dashed #ddd">미분류</span>`}
            </td>
            <td><span class="cat-badge" style="background:#f0f2f8;color:#555">${esc(sourceLabel(tx.source))}</span></td>
            <td class="${tx.type === '수입' ? 'amount-inc' : 'amount-exp'}">${fmt(tx.amount)}</td>
            <td>${esc(tx.method || '')}</td>
            <td class="memo-cell" data-tx-id="${tx.id}" onclick="editMemoInline(this)" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;cursor:text" title="클릭하여 메모 편집">
              <span class="memo-text" style="${tx.memo ? '' : 'color:#ccc'}">${esc(tx.memo || '메모 추가...')}</span>
            </td>
          </tr>
          <tr class="cancel-partner-row" id="cancel-partner-${tx.id}" style="display:none">
            <td colspan="${colCount}" style="padding:0">
              <div class="cancel-partner-panel" id="cancel-partner-panel-${tx.id}" style="padding:10px 20px;background:#f8f8fb;border-bottom:1px solid #e8e8f0;font-size:13px;color:#555"></div>
            </td>
          </tr>
        `}).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <button class="page-btn" onclick="goTxPage(${curPage-1})" ${curPage<=1?'disabled':''}>‹</button>
      <span class="page-info">${curPage} / ${totalPages || 1} 페이지 (총 ${fmtNum(txTotal)}건)</span>
      <button class="page-btn" onclick="goTxPage(${curPage+1})" ${curPage>=totalPages?'disabled':''}>›</button>
    </div>
  `;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortTx(col) {
  if (txFilter.sort === col) txFilter.sortDir *= -1;
  else { txFilter.sort = col; txFilter.sortDir = -1; }
  txFilter.offset = 0;
  loadTransactions();
}

function goTxPage(page) {
  const totalPages = Math.ceil(txTotal / txFilter.limit);
  if (page < 1 || page > totalPages) return;
  txFilter.offset = (page - 1) * txFilter.limit;
  loadTransactions();
}

const _cancelPartnerLoaded = new Set();

async function toggleCancelPartner(txId) {
  const row = document.getElementById(`cancel-partner-${txId}`);
  const panel = document.getElementById(`cancel-partner-panel-${txId}`);
  if (!row) return;

  if (row.style.display !== 'none') {

  panel.innerHTML = '<span style="color:var(--muted)">연결된 거래 찾는 중...</span>';
  const partner = await api(`/api/transactions/${txId}/cancel-partner`);

  if (!partner || !partner.id) {
    panel.innerHTML = '<span style="color:var(--muted)">연결된 거래를 찾을 수 없습니다.</span>';
    return;
  }

  const ci = CAT_ICONS[partner.cat];
  const catLabel = ci ? `${ci.icon} ${partner.cat}` : (partner.cat || '');
  const amtColor = partner.type === '수입' ? 'var(--income)' : 'var(--expense)';
  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">

      ${catLabel ? `<span class="cat-badge">${catLabel}</span>` : ''}
      <span class="cat-badge" style="background:#f0f2f8;color:#555">${esc(sourceLabel(partner.source||''))}</span>

}

async function openMatchModal(txId, desc, amount) {
  matchSourceTxId = txId;
  const modal = document.getElementById('match-modal');
  const descEl = document.getElementById('match-modal-desc');
  const listEl = document.getElementById('match-candidates-list');
  descEl.textContent = `뱅크샐러드 "${desc}" ${fmt(amount)} — 동기화 데이터에서 실제 상품 찾는 중...`;
  listEl.innerHTML = '<div style="color:var(--muted);padding:12px 0">검색 중...</div>';
  modal.style.display = 'flex';

  const candidates = await api(`/api/transactions/${txId}/match-candidates`);
  if (!candidates.length) {
    listEl.innerHTML = '<div style="color:var(--muted);padding:12px 0">±30일 내 같은 금액의 쿠팡/네이버페이 데이터가 없습니다.</div>';
    return;
  }
  listEl.innerHTML = candidates.map(c => {
    const isBundle = c.is_bundle;
    const descHtml = isBundle
      ? `<div style="font-size:13px;font-weight:600">
           <span style="background:#fff3e0;color:#e65100;font-size:11px;padding:1px 5px;border-radius:3px;margin-right:5px">묶음</span>
           ${esc(c.bundle_items || '')}
         </div>`
      : `<div style="font-size:13px;font-weight:600">${esc(c.desc || '')}</div>`;
    const amtLabel = isBundle ? `합계 ${fmt(c.total)}` : fmt(c.amount);
    const applyDesc = isBundle ? esc(c.bundle_items || '') : esc(c.desc || '');
    return `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        ${descHtml}
        <div style="font-size:12px;color:var(--muted);margin-top:2px">
          ${c.date} · ${isBundle ? '쿠팡 묶음결제' : sourceLabel(c.source)}
          ${c.cat ? ` · <span style="color:var(--primary)">${esc(c.cat)}</span>` : ''}
        </div>
      </div>
      <div style="font-size:14px;font-weight:700;white-space:nowrap">${amtLabel}</div>
      <button class="btn btn-primary" style="font-size:12px;padding:4px 12px;white-space:nowrap"
        onclick="applyMatchInfo(${txId}, '${applyDesc}', '${esc(c.cat||'')}', '${esc(c.subcat||'')}')">카테고리 적용</button>
    </div>`;
  }).join('');
}

async function applyMatchInfo(txId, desc, cat, subcat) {

            <input type="text" id="cat-picker-memo" placeholder="메모 (선택)" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;width:180px">
            <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer">

            <label id="cat-picker-apply-amount-wrap" style="display:none;font-size:12px;color:var(--muted);display:none;align-items:center;gap:4px;cursor:pointer">

function closeCatPicker() {
  document.getElementById('cat-picker-tr')?.remove();
  _pickerTxId = null;
}

function selectPickerCat(txId, cat, initialSubcat) {
  _pickerTxId = txId;
  document.querySelectorAll('#cat-picker-grid .cat-icon-btn').forEach(b => {
    b.classList.toggle('selected', b.title === cat);
  });
  const step2 = document.getElementById('cat-picker-step2');
  const badge = document.getElementById('cat-picker-badge');
  const info = CAT_ICONS[cat] || { icon: '📦' };
  if (badge) badge.textContent = `${info.icon} ${cat}`;
  step2._cat = cat;

  const grid = document.getElementById('cat-picker-subcat-grid');
  const hiddenInput = document.getElementById('cat-picker-subcat');
  hiddenInput.value = initialSubcat || '';
  const subs = subcatMap[cat] || [];
  grid.innerHTML = subs.map(s => `
    <button class="subcat-btn${s === (initialSubcat||'') ? ' selected' : ''}" onclick="pickSubcat(this,'${s.replace(/'/g,"\\'")}')">
      ${s}
    </button>
  `).join('') + `
    <button type="button" onclick="openSubcatManagerFromPicker('${cat.replace(/'/g,"\\'")}', '${txId}')" style="padding:3px 8px;font-size:11px;background:none;border:1px dashed var(--muted);border-radius:4px;color:var(--muted);cursor:pointer;white-space:nowrap">⚙ 세부 관리</button>`;

  if (step2) step2.style.display = 'block';
}

function toggleApplyAllAmount(cb) {
  const wrap = document.getElementById('cat-picker-apply-amount-wrap');
  if (wrap) wrap.style.display = cb.checked ? 'flex' : 'none';
}

function pickSubcat(btn, val) {
  document.querySelectorAll('#cat-picker-subcat-grid .subcat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('cat-picker-subcat').value = val;
}

async function confirmPickCategory(saveAsRule = false) {
  const step2 = document.getElementById('cat-picker-step2');
  const cat = step2?._cat;
  const subcat = document.getElementById('cat-picker-subcat')?.value || '미분류';
  const memo = document.getElementById('cat-picker-memo')?.value.trim() || null;
  const applyAll = document.getElementById('cat-picker-apply-all')?.checked;
  const applyAmount = applyAll && document.getElementById('cat-picker-apply-amount')?.checked;
  const txId = _pickerTxId;
  if (!cat || !txId) return;
  try {
    await api(`/api/transactions/${txId}/category`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cat, subcat, ...(memo && { memo }) }),
    });
    if (applyAll) {
      const tr = document.querySelector(`tr[data-tx-id="${txId}"]`);
      const desc = tr?.dataset?.desc;
      const amount = applyAmount ? tr?.dataset?.amount : null;
      if (desc) {
        const qs = new URLSearchParams({ desc });
        if (amount) qs.set('amount', amount);
        await api(`/api/transactions/bulk-category?${qs}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cat, subcat }),
        });
      }
    }
    if (saveAsRule) {
      const tr = document.querySelector(`tr[data-tx-id="${txId}"]`);
      const desc = tr?.dataset?.desc;
      if (desc) {
        await api('/api/rules', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword: desc, field: 'desc', cat, subcat, apply_existing: false }),
        });
      }
    }
    closeCatPicker();
    const ruleMsg = saveAsRule ? ' · 규칙 저장됨' : '';
    toast(`카테고리 → ${cat}${subcat && subcat !== '미분류' ? ' / ' + subcat : ''}${applyAll ? (applyAmount ? ' (금액 동일 전체 적용)' : ' (전체 적용)') : ''}${ruleMsg}`);
    // 대시보드 모달이 열려있으면 인메모리 데이터 갱신 후 재렌더
    const dashModal = document.getElementById('dash-modal');
    if (dashModal && dashModal.style.display !== 'none') {
      _dashModalCtx.txs = _dashModalCtx.txs.map(t =>
        t.id === txId ? { ...t, cat, subcat } : t
      );
      renderDashModalTable();
    } else {
      loadTransactions({ keepScroll: true });
    }
  } catch (e) {
    toast('저장 실패: ' + e.message, 'error');
  }
}

function closeCatModal() { closeCatPicker(); }

function editMemoInline(td) {
  if (td.querySelector('input')) return; // 이미 편집 중
  const txId = td.dataset.txId;
  const currentText = td.querySelector('.memo-text')?.textContent?.trim();
  const currentVal = currentText === '메모 추가...' ? '' : (currentText || '');
  td.innerHTML = `<input type="text" value="${esc(currentVal)}"
    style="width:100%;padding:2px 4px;border:1px solid var(--primary);border-radius:4px;font-size:13px;outline:none"
    onblur="saveMemoInline(this,${txId})"
    onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.dataset.cancel=1;this.blur();}">`;
  td.querySelector('input').focus();
}

async function saveMemoInline(input, txId) {
  if (input.dataset.cancel) {
    loadTransactions({ keepScroll: true }); return;
  }
  const memo = input.value.trim();
  try {
    await api(`/api/transactions/${txId}/memo`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memo }),
    });
    loadTransactions({ keepScroll: true });
  } catch (e) {
    toast('메모 저장 실패', 'error');
    loadTransactions({ keepScroll: true });
  }
}

let allMerchants = [];
let allCatStats = [];
let _merchViewMode = 'product'; // 'product' | 'category'
let _merchCat = '';
let _merchSort = { col: 'total', dir: -1 };

function renderMerchantsPage() {
  const c = document.getElementById('page-content');
  c.innerHTML = `

function setMerchView(mode) {
  _merchViewMode = mode;
  const prodBtn = document.getElementById('view-product-btn');
  const catBtn = document.getElementById('view-cat-btn');
  if (prodBtn && catBtn) {
    prodBtn.style.background = mode === 'product' ? 'var(--primary)' : 'transparent';
    prodBtn.style.color = mode === 'product' ? '#fff' : 'var(--text)';
    prodBtn.style.fontWeight = mode === 'product' ? '600' : '400';
    catBtn.style.background = mode === 'category' ? 'var(--primary)' : 'transparent';
    catBtn.style.color = mode === 'category' ? '#fff' : 'var(--text)';
    catBtn.style.fontWeight = mode === 'category' ? '600' : '400';
  }
  // 카테고리별은 소스 필터·카테고리 필터 숨기기
  const srcBtns = document.getElementById('merch-source-btns');
  const catFilter = document.getElementById('merch-cat-filter');
  if (srcBtns) srcBtns.style.display = mode === 'product' ? '' : 'none';
  if (catFilter) catFilter.style.display = mode === 'product' ? '' : 'none';
  _merchSort = { col: 'total', dir: -1 };
  filterMerchants();
}

function selectMerchCat(btn, cat) {
  document.querySelectorAll('#merch-cat-filter .cat-icon-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _merchCat = cat;
  filterMerchants();
}

async function loadMerchantsData() {
  const wrap = document.getElementById('merch-table-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  const pp = periodParams(txFilter.month);
  const params = new URLSearchParams();
  if (pp.date_from) { params.set('date_from', pp.date_from); params.set('date_to', pp.date_to); }
  const source = document.querySelector('#merch-source-btns .sf-btn.active')?.dataset?.source || '';
  if (source) params.set('source', source);
  try {
    const [merchants, catStats] = await Promise.all([
      api('/api/stats/merchants?' + params.toString()),
      api('/api/stats/categories?' + params.toString()),
    ]);
    allMerchants = merchants || [];
    allCatStats = catStats || [];
    filterMerchants();
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
  }
}

// 하위 호환 alias
async function loadMerchants() { await loadMerchantsData(); }

function filterMerchants() {
  const wrap = document.getElementById('merch-table-wrap');
  if (!wrap) return;
  if (_merchViewMode === 'category') {
    renderCatStatsTable(allCatStats, wrap);
  } else {
    const q = (document.getElementById('merch-search')?.value || '').toLowerCase();
    const source = document.querySelector('#merch-source-btns .sf-btn.active')?.dataset?.source || '';
    const filtered = allMerchants.filter(m => {
      const nameOk = !q || (m.merchant || '').toLowerCase().includes(q);
      const catOk = !_merchCat || m.cat === _merchCat;
      const srcOk = !source || m.source === source;
      return nameOk && catOk && srcOk;
    });
    renderMerchantsTable(filtered, wrap);
  }
}

          <th style="padding:4px 8px;text-align:left;color:var(--muted);font-weight:500">제품명</th>
          <th style="padding:4px 8px;text-align:left;color:var(--muted);font-weight:500">출처</th>

          const amtColor = t.type === '수입' ? 'var(--income)' : t.type === '취소' ? 'var(--muted)' : 'var(--expense)';
          return `<tr style="border-bottom:1px solid var(--border)" id="merch-cat-tx-${t.id}">

function sortMerchBy(col) {
  if (_merchSort.col === col) _merchSort.dir *= -1;
  else { _merchSort.col = col; _merchSort.dir = col === 'total' || col === 'count' ? -1 : 1; }
  filterMerchants();
}

function renderCatStatsTable(cats, wrap) {
  const q = (document.getElementById('merch-search')?.value || '').toLowerCase();
  let data = cats.filter(c => !q || (c.cat || '').toLowerCase().includes(q));
  const { col, dir } = _merchSort;
  data = [...data].sort((a, b) => {
    const av = col === 'total' ? (a.total || 0) : col === 'count' ? (a.cnt || 0) : (a.cat || '').toLowerCase();
    const bv = col === 'total' ? (b.total || 0) : col === 'count' ? (b.cnt || 0) : (b.cat || '').toLowerCase();
    return av < bv ? -dir : av > bv ? dir : 0;
  });
  if (!data.length) { wrap.innerHTML = '<div class="empty-state">데이터가 없습니다.</div>'; return; }
  const grandTotal = data.reduce((s, c) => s + (c.total || 0), 0) || 1;
  const maxTotal = Math.max(...data.map(c => c.total || 0), 1);
  const arrow = c => _merchSort.col === c ? (_merchSort.dir > 0 ? ' ▲' : ' ▼') : '';
  const th = (c, label) => `<th class="sortable" onclick="sortMerchBy('${c}')" style="cursor:pointer;user-select:none">${label}${arrow(c)}</th>`;
  wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            ${th('cat','카테고리')}
            ${th('count','건수')}
            <th>비중</th>
            ${th('total','합계')}
          </tr>
        </thead>
        <tbody>
        ${data.map((c, i) => {
          const info = CAT_ICONS[c.cat] || { icon: '📦' };
          const pct = Math.round((c.total / grandTotal) * 100);
          const barW = Math.round((c.total / maxTotal) * 100);
          const catKey = encodeURIComponent(c.cat || '');
          return `<tr class="cat-stat-row" style="cursor:pointer" onclick="toggleCatStatDetail(this,'${catKey}')" title="클릭하여 내역 보기">
            <td style="color:var(--muted)">${i+1}</td>
            <td><span class="cat-badge">${info.icon} ${esc(c.cat || '미분류')}</span> <span class="cat-expand-arrow" style="font-size:10px;color:var(--muted)">▶</span></td>
            <td>${fmtNum(c.cnt || 0)}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div class="merch-bar-wrap" style="flex:1"><div class="merch-bar" style="width:${barW}%"></div></div>
                <span style="font-size:11px;color:var(--muted);min-width:28px;text-align:right">${pct}%</span>
              </div>
            </td>
            <td class="amount-exp">${fmt(c.total)}</td>
          </tr>
          <tr class="cat-stat-detail-row" style="display:none" data-cat="${catKey}">
            <td colspan="5" style="padding:0">
              <div class="cat-stat-detail-panel" style="background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;font-size:13px"></div>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderMerchantsTable(merchants, wrap) {
  if (!merchants.length) {
    wrap.innerHTML = '<div class="empty-state">사용처 데이터가 없습니다.</div>';
    return;
  }
  const { col, dir } = _merchSort;
  const sorted = [...merchants].sort((a, b) => {
    const av = col === 'total' ? (a.total || 0) : col === 'count' ? (a.count || 0) : (a[col] || '').toString().toLowerCase();
    const bv = col === 'total' ? (b.total || 0) : col === 'count' ? (b.count || 0) : (b[col] || '').toString().toLowerCase();
    return av < bv ? -dir : av > bv ? dir : 0;
  });
  const maxTotal = Math.max(...sorted.map(m => m.total || 0), 1);
  const arrow = c => _merchSort.col === c ? (_merchSort.dir > 0 ? ' ▲' : ' ▼') : '';
  const th = (c, label) => `<th class="sortable" onclick="sortMerchBy('${c}')" style="cursor:pointer;user-select:none">${label}${arrow(c)}</th>`;
  wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            ${th('merchant','제품명')}
            ${th('cat','카테고리')}
            ${th('count','건수')}
            <th>비율</th>
            ${th('total','합계')}
          </tr>
        </thead>
        <tbody>
        ${sorted.slice(0,200).map((m, i) => {
          const pct = Math.round((m.total / maxTotal) * 100);
          return `
          <tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td>${esc(m.merchant || '')}</td>
            <td>${m.cat ? `<span class="cat-badge">${CAT_ICONS[m.cat]?.icon || ''} ${esc(m.cat)}</span>` : '<span style="color:var(--muted)">미분류</span>'}</td>
            <td>${fmtNum(m.count || 0)}</td>
            <td><div class="merch-bar-wrap"><div class="merch-bar" style="width:${pct}%"></div></div></td>
            <td class="amount-exp">${fmt(m.total)}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function uploadFiles(files) {
  if (!files || !files.length) return;
  const dz = document.getElementById('drop-zone');
  dz.querySelector('.drop-zone-text').textContent = '업로드 중...';
  let success = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      await api('/api/files/upload', { method: 'POST', body: fd });
      success++;
    } catch (e) {
      toast(`${file.name} 업로드 실패: ${e.message}`, 'error');
    }
  }
  dz.querySelector('.drop-zone-text').textContent = '파일을 드래그하거나 클릭하여 업로드';
  if (success) {
    toast(`${success}개 파일 업로드 완료`);
    await loadFileList();
    await loadActiveFile();
  }
}

async function loadFileList() {
  const wrap = document.getElementById('file-list-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const allFiles = await api('/api/files');
    // 쿠팡/네이버페이 동기화용 가상 파일은 업로드 목록에서 숨김 (확장에서 자동 관리됨)
    const files = (allFiles || []).filter(f => !f.name || !f.name.startsWith('_sync_'));
    if (!files.length) {
      wrap.innerHTML = '<div class="empty-state">업로드된 파일이 없습니다.</div>';
      return;
    }
    wrap.innerHTML = '<div class="file-list">' +
      files.map(f => `
        <div class="file-item ${f.active ? 'active-file' : ''}" id="file-item-${f.id}">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${esc(f.original_name)}${f.active ? '<span class="file-badge">활성</span>' : ''}</div>
            <div class="file-meta">${f.uploaded_at ? fmtDate(f.uploaded_at) : ''} · ${f.row_count != null ? fmtNum(f.row_count) + '행' : ''}</div>

        </div>
      `).join('') + '</div>';
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const msgs = document.getElementById('chat-messages');
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user';
  userBubble.textContent = msg;
  msgs.appendChild(userBubble);
  msgs.scrollTop = msgs.scrollHeight;

  const loadingBubble = document.createElement('div');
  loadingBubble.className = 'chat-bubble ai';
  loadingBubble.textContent = '...';
  msgs.appendChild(loadingBubble);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const data = await api('/api/ai/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, session_id: sessionId })
    });
    loadingBubble.textContent = data.reply || data.message || JSON.stringify(data);
  } catch (e) {
    const msg = e.message || '';
    loadingBubble.textContent = msg.includes('GOOGLE_API_KEY')
      ? 'AI 기능을 사용하려면 .env 파일에 GOOGLE_API_KEY를 설정하고 서버를 재시작하세요.\n발급: https://aistudio.google.com/apikey'
      : '오류: ' + msg;
    loadingBubble.style.color = 'var(--expense)';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

  btn.textContent = '처리 중...';
  result.innerHTML = '<span style="color:var(--muted)">AI가 분류 중입니다...</span>';

    const data = await api('/api/ai/suggest-categories?' + params.toString(), { method: 'POST' });

    if (updates.length) {
      await api('/api/transactions/bulk-update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ updates, source: 'ai' })
      });
      result.innerHTML = `<span style="color:var(--income)">✓ ${updates.length}건 카테고리 적용 완료</span>`;
      toast(`${updates.length}건 카테고리가 자동 분류되었습니다.`);
    } else {
      result.innerHTML = '<span style="color:var(--muted)">미분류 거래가 없거나 추천 결과가 없습니다.</span>';
    }
  } catch (e) {
    const msg = e.message || '';
    const friendly = msg.includes('GOOGLE_API_KEY')
      ? 'AI 기능을 사용하려면 .env 파일에 GOOGLE_API_KEY를 설정하고 서버를 재시작하세요. (발급: aistudio.google.com/apikey)'
      : '오류: ' + msg;
    result.innerHTML = `<span style="color:var(--expense)">${esc(friendly)}</span>`;
    toast(friendly, 'error');
  }
  btn.disabled = false;
  btn.textContent = '✨ 카테고리 추천 실행';
}

function renderRuleCatPicker() {
  const picker = document.getElementById('rule-cat-picker');
  if (!picker) return;
  const allCats = Object.keys(CAT_ICONS);
  // add custom cats not in CAT_ICONS
  if (window._customCats) {
    window._customCats.forEach(c => { if (!CAT_ICONS[c.name]) allCats.push(c.name); });
  }
  picker.innerHTML = allCats.map(name => {
    const info = CAT_ICONS[name] || { icon: '📦' };
    return `<button class="cat-icon-btn" onclick="pickRuleCat('${name}')" title="${name}" style="padding:5px 8px;font-size:12px;gap:3px">
      <span class="ci" style="font-size:16px">${info.icon}</span>
      <span>${name}</span>
    </button>`;
  }).join('') + `
    <button class="cat-icon-btn add-cat-btn" onclick="openAddCatModal()" title="카테고리 추가" style="padding:5px 8px;font-size:12px;gap:3px;border:1px dashed var(--muted);opacity:0.7">
      <span style="font-size:16px">＋</span>
      <span>카테고리 추가</span>
    </button>`;
}

async function openAddCatModalForPicker(txId) {
  const name = prompt('새 카테고리 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  await api(`/api/categories?name=${encodeURIComponent(name.trim())}&icon=📦`, { method: 'POST' });
  const data = await api('/api/categories');
  if (data.custom_categories) window._customCats = data.custom_categories;
  subcatMap = data.subcat_map || subcatMap;
  // 피커 그리드 갱신 (피커를 닫지 않고 아이콘 그리드만 교체)
  const grid = document.getElementById('cat-picker-grid');
  if (grid) {
    const allCats = Object.keys(CAT_ICONS);
    if (window._customCats) window._customCats.forEach(c => { if (!CAT_ICONS[c.name]) allCats.push(c.name); });
    grid.innerHTML = allCats.map(n => {
      const info = CAT_ICONS[n] || { icon: '📦' };
      return `<button class="cat-icon-btn" onclick="selectPickerCat('${txId}','${n}')" title="${n}">
        <span class="ci">${info.icon}</span><span>${n}</span>
      </button>`;
    }).join('') + `
      <button class="cat-icon-btn add-cat-btn" onclick="openAddCatModalForPicker('${txId}')" title="카테고리 추가" style="border:1px dashed var(--muted);opacity:0.7">
        <span style="font-size:16px">＋</span><span>추가</span>
      </button>`;
  }
  selectPickerCat(txId, name.trim());
}

async function openAddCatModal() {
  const name = prompt('새 카테고리 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  await api(`/api/categories?name=${encodeURIComponent(name.trim())}&icon=📦`, { method: 'POST' });
  // reload categories
  const data = await api('/api/categories');
  if (data.custom_categories) window._customCats = data.custom_categories;
  renderRuleCatPicker();
  pickRuleCat(name.trim());
}

let _managingCat = null;

function openSubcatManager(cat, event) {
  event?.stopPropagation();
  _managingCat = cat;
  const modal = document.getElementById('subcat-manager-modal');
  document.getElementById('subcat-manager-title').textContent = `"${cat}" 세부 카테고리 관리`;
  renderSubcatManagerList(cat);
  modal.style.display = 'flex';
}

function closeSubcatManager() {
  document.getElementById('subcat-manager-modal').style.display = 'none';
  _managingCat = null;
  _subcatManagerTxId = null;
}

let _subcatManagerTxId = null;

function openSubcatManagerFromPicker(cat, txId) {
  _subcatManagerTxId = txId;
  openSubcatManager(cat);
}

function renderSubcatManagerList(cat) {
  const subs = subcatMap[cat] || [];
  const list = document.getElementById('subcat-manager-list');
  list.innerHTML = subs.map(s => `
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="flex:1">${s}</span>
      <button onclick="deleteSubcat('${cat}','${s.replace(/'/g,"\\'")}')
" style="background:none;border:none;color:var(--expense);cursor:pointer;font-size:13px">삭제</button>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:13px">세부 분류 없음</div>';
}

async function addSubcatFromManager() {
  const input = document.getElementById('subcat-manager-input');
  const val = input.value.trim();
  if (!val || !_managingCat) return;
  try {
    await api(`/api/categories/subcats?cat=${encodeURIComponent(_managingCat)}`, { method: 'POST', json: { subcat_name: val } });
  } catch (e) { toast('추가 실패: ' + e.message, 'error'); return; }
  input.value = '';
  const data = await api('/api/categories');
  subcatMap = data.subcat_map || subcatMap;
  renderSubcatManagerList(_managingCat);
  _refreshSubcatPickersFor(_managingCat);
}

async function deleteSubcat(cat, sub) {
  if (!confirm(`"${sub}" 세부 카테고리를 삭제할까요?`)) return;
  await api(`/api/categories/subcats?cat=${encodeURIComponent(cat)}&subcat=${encodeURIComponent(sub)}`, { method: 'DELETE' });
  const data = await api('/api/categories');
  subcatMap = data.subcat_map || subcatMap;
  renderSubcatManagerList(cat);
  _refreshSubcatPickersFor(cat);
}

function _refreshSubcatPickersFor(cat) {
  // 규칙 폼 피커 갱신
  if (document.getElementById('rule-cat')?.value === cat) pickRuleCat(cat);
  // 거래내역 인라인 피커 갱신
  if (_subcatManagerTxId && document.getElementById('cat-picker-step2')?._cat === cat) {
    const currentSubcat = document.getElementById('cat-picker-subcat')?.value || '';
    selectPickerCat(_subcatManagerTxId, cat, currentSubcat);
  }
}

function pickRuleCat(cat) {
  document.getElementById('rule-cat').value = cat;
  document.querySelectorAll('#rule-cat-picker .cat-icon-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.title === cat);
  });
  const wrap = document.getElementById('rule-subcat-wrap');
  const badge = document.getElementById('rule-cat-badge');
  const info = CAT_ICONS[cat] || { icon: '📦' };
  if (badge) badge.textContent = `${info.icon} ${cat}`;

  // 서브카테고리 버튼형 렌더
  const grid = document.getElementById('rule-subcat-grid');
  const hidden = document.getElementById('rule-subcat');
  hidden.value = '';
  const subs = subcatMap[cat] || [];
  grid.innerHTML = subs.map(s => `
    <button type="button" class="subcat-btn" onclick="pickRuleSubcat(this,'${s.replace(/'/g,"\\'")}')">
      ${s}
    </button>
  `).join('') + `
    <button type="button" onclick="openSubcatManager('${cat.replace(/'/g,"\\'")}', event)" style="padding:3px 8px;font-size:11px;background:none;border:1px dashed var(--muted);border-radius:4px;color:var(--muted);cursor:pointer;white-space:nowrap">⚙ 세부 관리</button>
  `;

  if (wrap) wrap.style.display = 'block';
}

function pickRuleSubcat(btn, val) {
  document.querySelectorAll('#rule-subcat-grid .subcat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('rule-subcat').value = val;
}

let _editingRuleId = null;

function editRule(id, keyword, field, cat, subcat) {
  _editingRuleId = id;
  document.getElementById('rule-keyword').value = keyword;
  document.getElementById('rule-field').value = field;
  // 카테고리 선택 상태 복원
  if (cat) pickRuleCat(cat);
  // 서브카테고리 선택 상태 복원
  if (subcat) {
    document.getElementById('rule-subcat').value = subcat;
    document.querySelectorAll('#rule-subcat-grid .subcat-btn').forEach(b => {
      b.classList.toggle('selected', b.textContent.trim() === subcat);
    });
  }
  // 버튼 텍스트 변경
  document.querySelector('[onclick="addRule()"]').textContent = '규칙 수정';
  // 폼으로 스크롤
  document.querySelector('.rules-form')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetRuleForm() {
  _editingRuleId = null;
  document.getElementById('rule-keyword').value = '';
  document.getElementById('rule-cat').value = '';
  document.getElementById('rule-subcat').value = '';
  document.getElementById('rule-subcat-wrap').style.display = 'none';
  document.querySelectorAll('#rule-cat-picker .cat-icon-btn').forEach(b => b.classList.remove('selected'));
  if (document.getElementById('rule-apply-existing')) document.getElementById('rule-apply-existing').checked = false;
  document.querySelector('[onclick="addRule()"]').textContent = '규칙 추가';
}

async function addRule() {
  const keyword = document.getElementById('rule-keyword').value.trim();
  const field = document.getElementById('rule-field').value;
  const cat = document.getElementById('rule-cat').value;
  const subcat = document.getElementById('rule-subcat').value;
  if (!keyword) { toast('키워드를 입력하세요.', 'error'); return; }
  if (!cat) { toast('카테고리를 선택하세요.', 'error'); return; }
  const applyExisting = document.getElementById('rule-apply-existing')?.checked ?? false;
  const isEdit = !!_editingRuleId;
  try {
    if (isEdit) {
      await api(`/api/rules/${_editingRuleId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, field, cat, subcat, apply_existing: applyExisting })
      });
      toast(applyExisting ? '규칙이 수정되고 기존 데이터에 적용되었습니다.' : '규칙이 수정되었습니다.');
    } else {
      await api('/api/rules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, field, cat, subcat, apply_existing: applyExisting })
      });
      toast(applyExisting ? '규칙이 추가되고 기존 데이터에 적용되었습니다.' : '규칙이 추가되었습니다.');
    }
    resetRuleForm();
    loadRules();
  } catch (e) {
    toast((isEdit ? '규칙 수정' : '규칙 추가') + ' 실패: ' + e.message, 'error');
  }
}

let _rulesAll = [];
let _rulesSort = { col: null, dir: 1 };

async function loadRules() {
  const wrap = document.getElementById('rules-list-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    _rulesAll = await api('/api/rules') || [];
    renderRulesTable();
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
  }
}

function sortRulesBy(col) {
  if (_rulesSort.col === col) _rulesSort.dir *= -1;
  else { _rulesSort.col = col; _rulesSort.dir = 1; }
  renderRulesTable();
}

function renderRulesTable() {
  const wrap = document.getElementById('rules-list-wrap');
  if (!wrap) return;
  if (!_rulesAll.length) {
    wrap.innerHTML = '<div class="empty-state">등록된 규칙이 없습니다.</div>';
    return;
  }
  const rules = [..._rulesAll];
  const { col, dir } = _rulesSort;
  if (col) {
    rules.sort((a, b) => {
      const av = (a[col] || '').toString().toLowerCase();
      const bv = (b[col] || '').toString().toLowerCase();
      return av < bv ? -dir : av > bv ? dir : 0;
    });
  }
  const arrow = (c) => _rulesSort.col === c ? (_rulesSort.dir > 0 ? ' ▲' : ' ▼') : '';
  const th = (c, label) => `<th class="sortable" onclick="sortRulesBy('${c}')" style="cursor:pointer;user-select:none">${label}${arrow(c)}</th>`;
  wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            ${th('keyword','키워드')}
            ${th('field','매칭 필드')}
            ${th('cat','카테고리')}
            ${th('subcat','서브카테고리')}
            <th>액션</th>
          </tr>
        </thead>
        <tbody>
        ${rules.map((r, i) => `
          <tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td><strong>${esc(r.keyword)}</strong></td>
            <td>${{desc:'제품명',merchant:'제품명',memo:'메모',method:'결제수단'}[r.field] || r.field}</td>
            <td>${r.cat ? `<span class="cat-badge">${CAT_ICONS[r.cat]?.icon || ''} ${esc(r.cat)}</span>` : '-'}</td>
            <td>${esc(r.subcat || '-')}</td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-outline btn-sm" onclick="editRule(${r.id},'${esc(r.keyword)}','${esc(r.field||'merchant')}','${esc(r.cat||'')}','${esc(r.subcat||'')}')">수정</button>
              <button class="btn btn-outline btn-sm" onclick="applyRule(${r.id})" title="이 규칙을 기존 데이터에 적용">적용</button>
              <button class="btn btn-danger btn-sm" onclick="deleteRule(${r.id})">삭제</button>
            </td>
          </tr>
        `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function applyRule(id) {
  try {
    const data = await api(`/api/rules/${id}/apply`, { method: 'POST' });
    toast(`${data.count ?? 0}건에 적용되었습니다.`, 'ok');
    loadTransactions({ keepScroll: true });
  } catch (e) {
    toast('적용 실패: ' + e.message, 'error');
  }
}

async function deleteRule(id) {
  if (!confirm('이 규칙을 삭제하시겠습니까?')) return;
  try {
    await api(`/api/rules/${id}`, { method: 'DELETE' });
    toast('규칙이 삭제되었습니다.');
    loadRules();
  } catch (e) {
    toast('삭제 실패: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
async function init() {
  buildPeriodSelector();
  await Promise.all([
    checkHealth(),
    loadCategories(),
    loadActiveFile()
  ]);
  const initPage = location.hash.replace('#', '') || 'dashboard';
  navigateTo(initPage, false);
}

init();
